name: Build & Test

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar solución
        run: dotnet restore GimnasioFit.slnx

      - name: Compilar solución
        run: dotnet build GimnasioFit.slnx --configuration Release --no-restore

      - name: Ejecutar tests
        run: dotnet test GimnasioFit.slnx --configuration Release --no-build